{% extends "base.html" %}
{% block content %}
<section class="dashboard">
    <h2>Proximos encuentros LoL <span class="timezone">(America/Asuncion)</span></h2>
    <div id="matches-container">
        <p class="loading">Cargando encuentros...</p>
    </div>
    <div id="empty-state" class="empty hidden">
        <p>No hay encuentros programados para las proximas 48 horas.</p>
    </div>
    <div id="error-state" class="error hidden">
        <p>Error al cargar los encuentros. Reintentando...</p>
    </div>
</section>
{% endblock %}
