{% extends "base.html" %}
{% block title %}Combinadas{% endblock %}
{% block header %}Simulador de Combinadas{% endblock %}
{% block content %}
<div class="grid-2">
  <section class="card">
    <h2 class="card-title">Patas de la combinada</h2>
    <div id="legs-container">
      <div class="leg-row">
        <div class="form-field"><label>Probabilidad</label><input type="number" class="leg-prob" step="0.0001" min="0" max="1" required></div>
        <div class="form-field"><label>Cuota (opcional)</label><input type="number" class="leg-odds" step="0.01" min="1"></div>
        <button class="btn btn-danger leg-remove" type="button" title="Quitar">&times;</button>
      </div>
    </div>
    <button class="btn btn-outline" type="button" id="add-leg">+ Agregar pata</button>

    <div class="form-field" style="margin-top:1.5rem">
      <label for="combo-offered-odds">Combinada ofrecida (opcional)</label>
      <input id="combo-offered-odds" type="number" step="0.01" min="1" placeholder="Si se omite, se calcula el producto">
    </div>
    <button class="btn btn-primary" type="button" id="combo-analyze-btn">Analizar Combinada</button>
  </section>

  <section class="card">
    <h2 class="card-title">Resultado</h2>
    <p class="muted" id="combo-empty">Agrega al menos 1 pata y presiona Analizar.</p>
    <div id="combo-result" class="result" hidden></div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>Pirapire.initCombo();</script>
{% endblock %}
