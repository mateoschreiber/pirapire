<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirapire - LoL Stats</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body data-page="{{ page }}">

<div class="app-shell">
    <nav class="sidebar">
        <h1><a href="/">Pirapire</a></h1>
        <a href="/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
    </nav>
    <div class="main-area">
        <header class="topbar">
            <h2>{% block title %}Pirapire{% endblock %}</h2>
            <span class="meta" id="last-update"></span>
        </header>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
