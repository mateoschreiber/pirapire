<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#172554">
  <title>Pirapire - LoL Stats</title>
  <link rel="preload" href="/static/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/css/styles.css?v=20260715-10">
</head>
<body data-page="{{ page }}">
  <div class="app-shell">
    <nav class="sidebar" aria-label="Navegación principal">
      <h1><a href="/">Pirapire</a></h1>
      <a href="/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/sources" class="nav-link {% if page == 'sources' %}active{% endif %}">Fuentes</a>
    </nav>
    <div class="main-area">
      <header class="topbar">
        <h2>{% block title %}Pirapire{% endblock %}</h2>
        <time id="live-clock" class="live-clock" data-testid="live-clock" aria-label="Hora actual"></time>
      </header>
      <main class="content">{% block content %}{% endblock %}</main>
    </div>
  </div>
  <script src="/static/js/app.js?v=20260715-10"></script>
</body>
</html>
