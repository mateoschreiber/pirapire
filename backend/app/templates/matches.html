{% extends 'base.html' %}
{% block title %}Partidos{% endblock %}
{% block header %}Partidos{% endblock %}
{% block content %}
<section class="card"><h2 class="card-title">Proximos</h2>
<div id="upcoming-matches"><p class="muted">Cargando...</p></div></section>
<section class="card"><h2 class="card-title">Finalizados (Mundial 2026)</h2>
<div id="finished-matches"><p class="muted">Cargando...</p></div></section>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
  fetch("/dashboard/calendar?days=7").then(r => r.json()).then(events => {
    var h = "<table class=table><thead><tr><th>Fecha</th><th>Equipo A</th><th>Equipo B</th><th>Competicion</th><th>Mercados</th></tr></thead><tbody>";
    events.forEach(e => {
      var d = e.event_date ? new Date(e.event_date).toISOString().slice(0,16).replace("T"," ") : "?";
      h += "<tr><td>"+d+"</td><td>"+(e.team_a||"?")+"</td><td>"+(e.team_b||"?")+"</td><td>"+(e.competition||"")+"</td><td>"+(e.markets||0)+"</td></tr>";
    });
    h += "</tbody></table>";
    document.getElementById("upcoming-matches").innerHTML = h;
  });
  fetch("/data/football/matches").then(r => r.json()).then(matches => {
    var finished = matches.filter(m => m.status === "FINISHED");
    var h = "<table class=table><thead><tr><th>Fecha</th><th>Local</th><th>Visitante</th><th>Resultado</th></tr></thead><tbody>";
    finished.slice(0,20).forEach(m => {
      var score = (m.home_score||0) + " - " + (m.away_score||0);
      h += "<tr><td>"+(m.start_time||"?")+"</td><td>"+(m.home_team_id||"?")+"</td><td>"+(m.away_team_id||"?")+"</td><td>"+score+"</td></tr>";
    });
    h += "</tbody></table>";
    document.getElementById("finished-matches").innerHTML = h;
  });
});
</script>
{% endblock %}
