{% extends "base.html" %}
{% block title %}Deportes{% endblock %}
{% block header %}Deportes{% endblock %}
{% block content %}
<section class="card">
  <h2 class="card-title">Crear deporte</h2>
  <form id="sport-form" class="form-inline">
    <div class="form-field"><label for="sport-name">Nombre</label><input id="sport-name" required></div>
    <div class="form-field"><label for="sport-slug">Slug</label><input id="sport-slug" required></div>
    <button class="btn btn-primary" type="submit">Guardar</button>
  </form>
</section>

<section class="card">
  <h2 class="card-title">Deportes registrados</h2>
  <table id="sports-table" class="table"><thead><tr><th>ID</th><th>Nombre</th><th>Slug</th></tr></thead><tbody></tbody></table>
</section>
{% endblock %}
{% block scripts %}
<script>Pirapire.initSports();</script>
{% endblock %}
