services:
  pirapire_app:
    build: ./backend
    image: pirapire_app
    container_name: ${PIRAPIRE_CONTAINER_NAME:-pirapire_app}
    env_file:
      - .env
    ports:
      - "${PIRAPIRE_PORT:-8090}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backend/app/static/team-logos:/app/app/static/team-logos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  pirapire_worker:
    build: ./backend
    image: pirapire_app
    container_name: ${PIRAPIRE_WORKER_NAME:-pirapire_worker}
    command: python -m app.worker_main
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backend/app/static/team-logos:/app/app/static/team-logos
    restart: unless-stopped
    depends_on:
      pirapire_app:
        condition: service_healthy
