# Pirapire - standalone deployment.
# Works from any directory: clone the repo, copy .env.example to .env, then
#   docker compose up -d --build
# Data and logs are stored next to this file (./data and ./logs).

services:
  pirapire_app:
    build: ./backend
    image: pirapire_app
    container_name: ${PIRAPIRE_CONTAINER_NAME:-pirapire_app}
    env_file:
      - .env
    ports:
      - "${PIRAPIRE_PORT:-8090}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
